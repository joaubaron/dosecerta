<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f2744">
<meta name="description" content="Controle de remédios com alertas">
<link rel="manifest" href="./manifest.json">
<title>Dose Certa</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0f2744;--surface:#162f52;--surface2:#1c3a62;
    --accent:#00c896;--accent2:#00a87e;
    --warn:#f5a623;--danger:#e05555;
    --text:#e8f0fe;--text2:#8aa4c8;--text3:#5a7399;
    --radius:16px;--pill:999px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}

  .header{padding:env(safe-area-inset-top,12px) 20px 12px;flex-shrink:0}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:38px;height:38px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center}
  .logo-icon svg{width:22px;height:22px;fill:white}
  .logo-text h1{font-size:20px;font-weight:700}
  .logo-text p{font-size:12px;color:var(--text2);margin-top:1px}
  .btn-notif{background:var(--surface);border:none;border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .btn-notif svg{width:20px;height:20px;fill:var(--text2)}
  .btn-notif.granted svg{fill:var(--accent)}

  .next-banner{margin:0 20px 16px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:var(--radius);padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
  .next-banner.hidden{display:none}
  .next-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.75)}
  .next-name{font-size:16px;font-weight:700;color:white}
  .next-time{font-size:28px;font-weight:800;color:white}

  .tabs{display:flex;padding:0 20px;gap:8px;margin-bottom:16px;flex-shrink:0}
  .tab{flex:1;padding:10px;border:none;border-radius:var(--pill);font-size:14px;font-weight:600;cursor:pointer}
  .tab.active{background:var(--accent);color:white}
  .tab:not(.active){background:var(--surface);color:var(--text2)}

  .content{flex:1;overflow-y:auto;padding:0 20px;padding-bottom:100px}
  .content::-webkit-scrollbar{display:none}

  .med-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start}
  .card-name{font-size:17px;font-weight:700}
  .card-dose{background:var(--surface2);color:var(--accent);font-size:12px;font-weight:600;padding:4px 10px;border-radius:var(--pill)}
  .card-times{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .time-chip{background:var(--surface2);border-radius:var(--pill);padding:5px 12px;font-size:13px;display:flex;align-items:center;gap:6px}
  .time-chip.taken{opacity:0.45;text-decoration:line-through}
  .chip-dot{width:7px;height:7px;border-radius:50%}
  .chip-dot.ok{background:var(--accent)}
  .chip-dot.warn{background:var(--warn)}
  .card-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.06)}
  .btn-taken{flex:1;background:var(--accent);color:white;border:none;border-radius:var(--pill);padding:9px;font-size:13px;font-weight:600;cursor:pointer}
  .btn-edit{background:var(--surface2);color:var(--text2);border:none;border-radius:var(--pill);padding:9px 16px;cursor:pointer}
  .btn-del{background:rgba(224,85,85,0.15);color:var(--danger);border:none;border-radius:var(--pill);padding:9px 16px;cursor:pointer}

  .empty{text-align:center;padding:40px 20px;color:var(--text2)}
  .notif-req{background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.3);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;cursor:pointer}
  .notif-req.hidden{display:none}
  .notif-req svg{width:20px;height:20px;fill:var(--warn)}

  .fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:20px;
    background:var(--accent);color:white;border:none;border-radius:var(--pill);
    padding:16px 24px;font-size:16px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;gap:8px;z-index:100}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;
    display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:0 0 env(safe-area-inset-bottom,20px);width:100%;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-handle{width:40px;height:4px;background:var(--text3);border-radius:var(--pill);margin:12px auto 20px}
  .modal-title{font-size:20px;font-weight:700;padding:0 20px;margin-bottom:20px}
  .field{padding:0 20px;margin-bottom:16px}
  label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px}
  input,select{width:100%;background:var(--surface2);border:1.5px solid transparent;border-radius:12px;color:var(--text);font-size:16px;padding:13px 16px;outline:none}
  input:focus,select:focus{border-color:var(--accent)}
  .times-builder{padding:0 20px;margin-bottom:16px}
  .times-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .time-tag{background:var(--surface2);border-radius:var(--pill);padding:7px 14px;font-size:14px;display:flex;align-items:center;gap:8px}
  .time-tag button{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer}
  .time-add-row{display:flex;gap:8px}
  .time-add-row input{flex:1}
  .btn-add-time{background:var(--accent);color:white;border:none;border-radius:12px;padding:13px 18px;cursor:pointer}
  .modal-actions{display:flex;gap:10px;padding:20px}
  .btn-save{flex:1;background:var(--accent);color:white;border:none;border-radius:var(--pill);padding:16px;font-size:16px;font-weight:700;cursor:pointer}
  .btn-cancel{background:var(--surface2);color:var(--text2);border:none;border-radius:var(--pill);padding:16px 20px;cursor:pointer}

  .hist-date{font-size:12px;font-weight:600;color:var(--text3);margin:16px 0 8px}
  .hist-item{background:var(--surface);border-radius:12px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
  .hist-dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
  .hist-info{flex:1}
  .hist-name{font-size:15px;font-weight:600}
  .hist-detail{font-size:13px;color:var(--text2)}
  .hist-time{font-size:13px;color:var(--text3)}

  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none}
  .confirm-overlay.open{opacity:1;pointer-events:all}
  .confirm-box{background:var(--surface);border-radius:20px;padding:28px 24px;width:100%;max-width:340px;text-align:center}
  .confirm-title{font-size:18px;font-weight:700;margin-bottom:8px}
  .confirm-btns{display:flex;gap:10px;margin-top:24px}
  .confirm-btns button{flex:1;border:none;border-radius:var(--pill);padding:14px;font-weight:600;cursor:pointer}
  .confirm-no{background:var(--surface2);color:var(--text2)}
  .confirm-yes{background:var(--danger);color:white}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">💊</div>
        <div class="logo-text"><h1>Dose Certa</h1><p id="clockDisplay">--:--</p></div>
      </div>
      <button class="btn-notif" id="btnNotif" onclick="solicitarPermissaoPush()"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10.5 3.17 10.5 4v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></button>
    </div>
  </div>
  <div class="next-banner hidden" id="nextBanner"><div><div class="next-label">Próxima dose</div><div class="next-name" id="nextName">—</div></div><div class="next-time" id="nextTimeDisplay">--:--</div></div>
  <div class="tabs"><button class="tab active" onclick="showTab('meds')">Meus remédios</button><button class="tab" onclick="showTab('history')">Histórico</button></div>
  <div class="content" id="contentMeds"><div class="notif-req hidden" id="notifBanner" onclick="solicitarPermissaoPush()"><svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21z"/></svg><p>Toque para ativar alertas mesmo com tela bloqueada</p></div><div id="medList"></div></div>
  <div class="content" id="contentHistory" style="display:none"><div id="histList"></div></div>
  <button class="fab" onclick="openModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Adicionar</button>
</div>

<div class="confirm-overlay" id="confirmOverlay"><div class="confirm-box"><div class="confirm-title">Remover remédio?</div><div class="confirm-btns"><button class="confirm-no" onclick="closeConfirm()">Cancelar</button><button class="confirm-yes" id="confirmYesBtn">Remover</button></div></div></div>

<script>
// ==================== CONFIGURAÇÕES PUSH ====================
const VAPID_PUBLIC_KEY = 'BO5DP1GQXi-qWd2E_rxNjEcqm00zVnZTY7x_m0435XEPuORtnAee5QzdfJwQJOI1Alk6I4rKFh_CMHCh2qUgU7o';

let subscription = null;
let meds = [], history = [], takenToday = {};
let editingId = null, tempTimes = [], currentTab = 'meds';

// ==================== STORAGE ====================
function load() {
  try { meds = JSON.parse(localStorage.getItem('dosecerta_meds')) || []; } catch(e) { meds = []; }
  try { history = JSON.parse(localStorage.getItem('dosecerta_hist')) || []; } catch(e) { history = []; }
  try { takenToday = JSON.parse(localStorage.getItem('dosecerta_taken')) || {}; } catch(e) { takenToday = {}; }
  cleanTakenToday();
}
function save() {
  localStorage.setItem('dosecerta_meds', JSON.stringify(meds));
  localStorage.setItem('dosecerta_hist', JSON.stringify(history.slice(0, 500)));
  localStorage.setItem('dosecerta_taken', JSON.stringify(takenToday));
}
function cleanTakenToday() {
  const today = new Date().toLocaleDateString('pt-BR');
  if (takenToday._date !== today) { takenToday = { _date: today }; save(); }
}
function todayStr() { return new Date().toLocaleDateString('pt-BR'); }
function nowHHMM() { return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { return String(s).replace(/[&<>]/g, function(m) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]; }); }

// ==================== PUSH NOTIFICATIONS ====================
async function registrarServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  const reg = await navigator.serviceWorker.register('./sw.js');
  console.log('SW registrado');
  return reg;
}

async function solicitarPermissaoPush() {
  if (!('Notification' in window)) { alert('Seu navegador não suporta notificações'); return; }
  
  const permissao = Notification.permission;
  if (permissao === 'denied') {
    alert('As notificações estão bloqueadas. Por favor, desbloqueie nas configurações do navegador.');
    return;
  }
  
  if (permissao === 'granted') {
    await inscreverPush();
    return;
  }
  
  // Pede permissão
  const result = await Notification.requestPermission();
  if (result === 'granted') {
    await inscreverPush();
    document.getElementById('btnNotif').classList.add('granted');
    document.getElementById('notifBanner').classList.add('hidden');
    // Teste
    registrarNotificacaoTeste();
  }
}

async function inscreverPush() {
  if (!('serviceWorker' in navigator)) return;
  const reg = await navigator.serviceWorker.ready;
  const existing = await reg.pushManager.getSubscription();
  if (existing) { subscription = existing; return; }
  
  try {
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: VAPID_PUBLIC_KEY
    });
    subscription = sub;
    console.log('Push inscrito:', sub);
    // Salva a inscrição no servidor (opcional, pra enviar push externo)
    localStorage.setItem('push_sub', JSON.stringify(sub));
  } catch(e) { console.error('Erro push:', e); }
}

// Função para agendar notificações (usando setTimeout)
let timersAtivos = {};

// Função para agendar notificações que funcionam com app fechado
function agendarNotificacoes() {
  if (Notification.permission !== 'granted') return;
  
  const agora = new Date();
  
  meds.forEach(med => {
    (med.times || []).forEach(horario => {
      const key = `${med.id}_${horario}`;
      if (takenToday[key]) return;
      
      const [h, m] = horario.split(':').map(Number);
      const horarioDate = new Date();
      horarioDate.setHours(h, m, 0, 0);
      
      if (horarioDate <= agora) return;
      
      // Calcula delay em milissegundos
      const delay = horarioDate.getTime() - agora.getTime();
      
      // Agenda usando setTimeout (funciona com app aberto)
      const timerId = setTimeout(() => {
        // Notificação local via Service Worker
        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({
            type: 'SHOW_NOTIFICATION',
            title: '💊 Hora do remédio!',
            body: `${med.name} — ${med.dose} às ${horario}`
          });
        } else {
          // Fallback
          new Notification('💊 Hora do remédio!', {
            body: `${med.name} — ${med.dose} às ${horario}`,
            icon: './icon-192.png'
          });
        }
        
        // Marca que já notificou para não repetir
        localStorage.setItem(`notified_${key}`, 'true');
      }, delay);
      
      timersAtivos[key] = timerId;
    });
  });
}

async function registrarNotificacaoTeste() {
  const reg = await navigator.serviceWorker.ready;
  reg.showNotification('✅ Alertas ativados!', {
    body: 'Você receberá lembretes nos horários cadastrados.',
    icon: '/icon-192.png'
  });
}

// ==================== TABS ====================
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'meds') || (i === 1 && tab === 'history')));
  document.getElementById('contentMeds').style.display = tab === 'meds' ? '' : 'none';
  document.getElementById('contentHistory').style.display = tab === 'history' ? '' : 'none';
  if (tab === 'history') renderHistory();
}

// ==================== RENDER ====================
function getCardStatus(med) {
  const times = med.times || [];
  if (!times.length) return Object.keys(takenToday).some(k => k.startsWith(`${med.id}_geral`)) ? 'ok' : 'none';
  if (times.every(t => takenToday[`${med.id}_${t}`])) return 'ok';
  return 'none';
}

function renderMeds() {
  const list = document.getElementById('medList');
  if (!meds.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">💊</div><h3>Nenhum remédio ainda</h3><p>Toque em "Adicionar" para cadastrar seu primeiro remédio e configurar os horários.</p></div>';
    return;
  }
  
  list.innerHTML = meds.map(med => {
    const allTaken = (med.times || []).length > 0 && (med.times || []).every(t => takenToday[`${med.id}_${t}`]);
    const timesHtml = (med.times || []).map(t => `<div class="time-chip${takenToday[`${med.id}_${t}`] ? ' taken' : ''}"><span class="chip-dot ok"></span>${t}</div>`).join('');
    
    return `<div class="med-card">
      <div class="card-top">
        <div class="card-name">${esc(med.name)}</div>
        <div class="card-dose">${esc(med.dose)}</div>
      </div>
      ${med.notes ? `<div style="font-size:13px;color:var(--text2);margin-top:6px">${esc(med.notes)}</div>` : ''}
      ${timesHtml ? `<div class="card-times">${timesHtml}</div>` : ''}
      <div class="card-actions">
        <button class="btn-taken" onclick="marcarTomado('${med.id}')" ${allTaken ? 'disabled' : ''}>${allTaken ? '✓ Tudo tomado' : '✓ Marcar tomado'}</button>
        <button class="btn-edit" onclick="openModal('${med.id}')">Editar</button>
        <button class="btn-del" onclick="deleteMed('${med.id}')">Remover</button>
      </div>
    </div>`;
  }).join('');
}

function marcarTomado(id) {
  const med = meds.find(m => m.id === id);
  if (!med) return;
  
  const agora = nowHHMM();
  const times = med.times || [];
  let horarioMarcado = null;
  
  if (times.length === 0) {
    // Sem horário fixo
    const chave = `${id}_geral_${agora}`;
    if (!takenToday[chave]) {
      takenToday[chave] = new Date().toISOString();
      horarioMarcado = "agora";
    }
  } else {
    // Marca o próximo horário ou o que mais se aproxima
    const agoraMinutes = parseInt(agora.split(':')[0]) * 60 + parseInt(agora.split(':')[1]);
    let proximo = null;
    let menorDiferenca = Infinity;
    
    for (const t of times) {
      if (takenToday[`${id}_${t}`]) continue;
      const [th, tm] = t.split(':').map(Number);
      const tMinutes = th * 60 + tm;
      let diff = tMinutes - agoraMinutes;
      if (diff >= 0 && diff < menorDiferenca) {
        menorDiferenca = diff;
        proximo = t;
      }
    }
    
    if (proximo) {
      takenToday[`${id}_${proximo}`] = new Date().toISOString();
      horarioMarcado = proximo;
    } else if (times.length > 0 && !times.some(t => !takenToday[`${id}_${t}`])) {
      // Já todos tomados, não faz nada
      return;
    } else {
      // Marca o mais próximo mesmo que já tenha passado
      for (const t of times) {
        if (!takenToday[`${id}_${t}`]) {
          takenToday[`${id}_${t}`] = new Date().toISOString();
          horarioMarcado = t;
          break;
        }
      }
    }
  }
  
  if (horarioMarcado) {
    const hoje = new Date().toLocaleDateString('pt-BR');
    const hojeISO = new Date().toISOString().slice(0, 10);
    
    // Procura se já existe um histórico para este remédio HOJE
    const indiceExistente = history.findIndex(h => 
      h.medId === id && 
      h.dataReferencia === hojeISO
    );
    
    if (indiceExistente !== -1) {
      // Já tem registro hoje → adiciona o novo horário à lista
      const entry = history[indiceExistente];
      const horariosRegistrados = entry.horarios || [];
      
      // Evita duplicar o mesmo horário
      if (!horariosRegistrados.includes(horarioMarcado)) {
        horariosRegistrados.push(horarioMarcado);
        horariosRegistrados.sort();
      }
      
      // Atualiza a entrada
      history[indiceExistente] = {
        ...entry,
        horarios: horariosRegistrados,
        ultimoHorario: horarioMarcado,
        updatedAt: new Date().toISOString()
      };
    } else {
      // Primeira vez do dia → cria nova entrada
      history.unshift({
        medId: id,
        medName: med.name,
        dose: med.dose,
        horarios: [horarioMarcado],
        dataReferencia: hojeISO,
        dataLegivel: hoje,
        takenAt: new Date().toISOString()
      });
    }
    
    save();
    renderAll();
    if (currentTab === 'history') renderHistory(); // Atualiza histórico em tempo real
    agendarNotificacoes();
  }
}

function deleteMed(id) {
  const med = meds.find(m => m.id === id);
  if (!med) return;
  document.querySelector('#confirmOverlay .confirm-title').innerHTML = `Remover "${med.name}"?`;
  const btn = document.getElementById('confirmYesBtn');
  btn.onclick = () => {
    meds = meds.filter(m => m.id !== id);
    save();
    renderAll();
    closeConfirm();
    agendarNotificacoes();
  };
  document.getElementById('confirmOverlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); }

function renderHistory() {
  const list = document.getElementById('histList');
  if (!history.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><h3>Histórico vazio</h3><p>Aqui aparecerá o registro de remédios tomados.</p></div>';
    return;
  }
  
  list.innerHTML = history.slice(0, 100).map(h => {
    // Formata os horários (ex: "08:00, 11:30")
    const horariosStr = h.horarios ? h.horarios.join(', ') : h.ultimoHorario || h.time || '';
    const dosePlural = h.horarios && h.horarios.length > 1 ? 
      h.dose.replace(/1 comprimido/, `${h.horarios.length} comprimidos`).replace(/1 cápsula/, `${h.horarios.length} cápsulas`) : 
      h.dose;
    
    return `
      <div class="hist-item">
        <div class="hist-dot"></div>
        <div class="hist-info">
          <div class="hist-name">${esc(h.medName)}</div>
          <div class="hist-detail">${esc(dosePlural)} · ${horariosStr}</div>
        </div>
        <div class="hist-time">${h.dataLegivel || new Date(h.takenAt).toLocaleDateString('pt-BR')}</div>
      </div>
    `;
  }).join('');
}

function updateNextBanner() {
  const banner = document.getElementById('nextBanner');
  const agora = nowHHMM();
  const agoraMinutes = parseInt(agora.split(':')[0]) * 60 + parseInt(agora.split(':')[1]);
  let proximo = null;
  
  for (const med of meds) {
    for (const t of (med.times || [])) {
      if (takenToday[`${med.id}_${t}`]) continue;
      const [h, m] = t.split(':').map(Number);
      const tMinutes = h * 60 + m;
      if (tMinutes >= agoraMinutes) {
        if (!proximo || tMinutes < proximo.minutes) {
          proximo = { name: med.name, time: t, minutes: tMinutes };
        }
      }
    }
  }
  
  if (proximo) {
    document.getElementById('nextName').textContent = proximo.name;
    document.getElementById('nextTimeDisplay').textContent = proximo.time;
    banner.classList.remove('hidden');
  } else {
    banner.classList.add('hidden');
  }
}

function updateClock() {
  document.getElementById('clockDisplay').textContent = nowHHMM();
}

async function renderAll() {
  renderMeds();
  updateNextBanner();
  if (currentTab === 'history') renderHistory();
  if (Notification.permission === 'granted') {
    document.getElementById('btnNotif').classList.add('granted');
    document.getElementById('notifBanner').classList.add('hidden');
  } else {
    document.getElementById('btnNotif').classList.remove('granted');
    if (meds.length > 0) document.getElementById('notifBanner').classList.remove('hidden');
  }
}

// ==================== MODAL ====================
function openModal(id = null) {
  editingId = id;
  tempTimes = [];
  document.getElementById('fName').value = '';
  document.getElementById('fDose').value = '';
  document.getElementById('fNotes').value = '';
  document.getElementById('fFreq').value = 'daily';
  document.getElementById('fTime').value = '08:00';
  document.getElementById('modalTitle').textContent = id ? 'Editar remédio' : 'Novo remédio';
  
  if (id) {
    const med = meds.find(m => m.id === id);
    if (med) {
      document.getElementById('fName').value = med.name;
      document.getElementById('fDose').value = med.dose;
      document.getElementById('fNotes').value = med.notes || '';
      document.getElementById('fFreq').value = med.freq || 'daily';
      tempTimes = [...(med.times || [])];
    }
  }
  renderTimeTags();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function renderTimeTags() {
  document.getElementById('timeTagsList').innerHTML = tempTimes.map((t, i) => `<div class="time-tag">${t}<button onclick="removeTime(${i})">×</button></div>`).join('');
}

function addTime() {
  const v = document.getElementById('fTime').value;
  if (!v) return;
  if (!tempTimes.includes(v)) { tempTimes.push(v); tempTimes.sort(); }
  renderTimeTags();
}

function removeTime(i) { tempTimes.splice(i, 1); renderTimeTags(); }

function saveMed() {
  const name = document.getElementById('fName').value.trim();
  const dose = document.getElementById('fDose').value.trim();
  if (!name || !dose) { alert('Preencha nome e dosagem'); return; }
  
  const vTime = document.getElementById('fTime').value;
  if (vTime && !tempTimes.includes(vTime)) { tempTimes.push(vTime); tempTimes.sort(); }
  
  const med = {
    id: editingId || uid(),
    name: name,
    dose: dose,
    freq: document.getElementById('fFreq').value,
    times: [...tempTimes],
    notes: document.getElementById('fNotes').value.trim(),
    createdAt: editingId ? (meds.find(m => m.id === editingId) || {}).createdAt || new Date().toISOString() : new Date().toISOString()
  };
  
  meds = editingId ? meds.map(m => m.id === editingId ? med : m) : [...meds, med];
  save();
  closeModal();
  renderAll();
  agendarNotificacoes(); // Reagenda com novos horários
}

// ==================== INIT ====================
(async function init() {
  load();
  await registrarServiceWorker();
  renderAll();
  updateClock();
  setInterval(updateClock, 10000);
  agendarNotificacoes(); // Agenda todas as notificações
  
  // Verifica permissão
  if (Notification.permission === 'granted') {
    await inscreverPush();
    document.getElementById('btnNotif').classList.add('granted');
  }
})();

// Fim do script - falta o modal HTML
// Vou adicionar o modal no final do body via JS para garantir
setTimeout(() => {
  if (!document.getElementById('modalOverlay')) {
    const modalHTML = `
    <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
      <div class="modal">
        <span class="modal-handle"></span>
        <div class="modal-title" id="modalTitle">Novo remédio</div>
        <div class="field"><label>Nome do remédio</label><input type="text" id="fName" placeholder="Ex: Diovan, Losartana..."></div>
        <div class="field"><label>Dosagem</label><input type="text" id="fDose" placeholder="Ex: 50mg, 1 comprimido"></div>
        <div class="field"><label>Frequência</label><select id="fFreq"><option value="daily">Diária</option><option value="weekly">Semanal</option><option value="asneeded">Quando necessário</option></select></div>
        <div class="times-builder"><label>Horários</label><div class="times-list" id="timeTagsList"></div><div class="time-add-row"><input type="time" id="fTime"><button class="btn-add-time" onclick="addTime()">+ Adicionar</button></div></div>
        <div class="field"><label>Observações</label><input type="text" id="fNotes" placeholder="Ex: Tomar em jejum"></div>
        <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="saveMed()">Salvar</button></div>
      </div>
    </div>`;
    document.body.insertAdjacentHTML('beforeend', modalHTML);
  }
}, 0);
</script>
